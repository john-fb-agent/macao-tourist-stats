<!DOCTYPE html>
<html lang="zh-MO">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🇲🇴 澳門旅客統計 | Macau Tourist Statistics</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        .header { text-align: center; color: white; margin-bottom: 30px; }
        .header h1 { font-size: 2.5em; margin-bottom: 10px; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
        .header p { font-size: 1.2em; opacity: 0.9; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; border-radius: 15px; padding: 20px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .stat-card h3 { color: #667eea; font-size: 0.9em; margin-bottom: 10px; text-transform: uppercase; }
        .stat-card .value { font-size: 2em; font-weight: bold; color: #333; }
        .stat-card .sub { color: #666; font-size: 0.9em; margin-top: 5px; }
        .charts-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(600px, 1fr)); gap: 30px; margin-bottom: 30px; }
        .chart-card { background: white; border-radius: 15px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .chart-card h2 { color: #333; margin-bottom: 20px; font-size: 1.5em; }
        .chart-container { position: relative; height: 400px; }
        .footer { text-align: center; color: white; margin-top: 30px; opacity: 0.8; }
        .loading { text-align: center; color: white; font-size: 1.5em; padding: 50px; }
        .error { background: #ff6b6b; color: white; padding: 20px; border-radius: 10px; margin: 20px 0; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🇲🇴 澳門旅客統計</h1>
            <p>Macau Tourist Statistics Dashboard</p>
            <p id="last-update"></p>
        </div>
        
        <div id="loading" class="loading">📊 Loading data...</div>
        
        <div id="content" style="display: none;">
            <div class="stats-grid" id="stats-grid"></div>
            
            <div class="chart-card">
                <h2>📈 旅客趨勢 | Tourist Arrivals Trend</h2>
                <div class="chart-container"><canvas id="lineChart"></canvas></div>
            </div>
        </div>
        
        <div class="footer">
            <p>Made with ❤️ for Macau Data Analysis</p>
            <p>© 2026 | Data from <a href="https://data.gov.mo" target="_blank">data.gov.mo</a></p>
        </div>
    </div>
    
    <script>
        // Color palette
        const colors = {
            primary: '#667eea',
            secondary: '#764ba2',
            mainland: '#ff6b6b',
            hk: '#4ecdc4',
            taiwan: '#45b7d1',
            other: '#ffa502',
            total: '#667eea'
        };
        
        // Format number with commas
        function formatNumber(num) {
            return num.toLocaleString('en-US');
        }
        
        // Load data
        async function loadData() {
            try {
                const response = await fetch('data/data.json');
                if (!response.ok) throw new Error('Failed to load data');
                const data = await response.json();
                return data.value || data;
            } catch (error) {
                console.error('Error loading data:', error);
                return null;
            }
        }
        
        // Process data
        function processData(data) {
            const values = data.values || data;
            if (!values || values.length === 0) {
                return { labels: [], total: [] };
            }
            
            const labels = values.map(r => r.periodString || '');
            const total = values.map(r => parseInt(r.value || 0));
            
            return { labels, total };
        }
        
        // Calculate stats
        function calculateStats(data) {
            const sum = arr => arr.reduce((a, b) => a + b, 0);
            const avg = arr => arr.length ? sum(arr) / arr.length : 0;
            
            return {
                total: {
                    sum: sum(data.total),
                    avg: avg(data.total),
                    max: Math.max(...data.total),
                    min: Math.min(...data.total)
                },
                records: data.labels.length
            };
        }
        
        // Display stats
        function displayStats(stats) {
            document.getElementById('stats-grid').innerHTML = `
                <div class="stat-card">
                    <h3>📊 Total</h3>
                    <div class="value">${formatNumber(stats.total.sum)}</div>
                    <div class="sub">${formatNumber(Math.round(stats.total.avg))} / month</div>
                </div>
                <div class="stat-card">
                    <h3>📈 Maximum</h3>
                    <div class="value">${formatNumber(stats.total.max)}</div>
                    <div class="sub">Peak month</div>
                </div>
                <div class="stat-card">
                    <h3>📉 Minimum</h3>
                    <div class="value">${formatNumber(stats.total.min)}</div>
                    <div class="sub">Lowest month</div>
                </div>
                <div class="stat-card">
                    <h3>📅 Records</h3>
                    <div class="value">${stats.records}</div>
                    <div class="sub">months</div>
                </div>
            `;
        }
        
        // Create line chart
        function createLineChart(data) {
            const ctx = document.getElementById('lineChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: data.labels,
                    datasets: [{
                        label: 'Total Visitors',
                        data: data.total,
                        borderColor: colors.total,
                        backgroundColor: colors.total + '20',
                        borderWidth: 3,
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: { beginAtZero: true }
                    }
                }
            });
        }
        
        // Initialize
        async function init() {
            const records = await loadData();
            if (!records) {
                document.getElementById('loading').innerHTML = '<div class="error">Failed to load data</div>';
                return;
            }
            
            const data = processData(records);
            if (!data.labels || data.labels.length === 0) {
                document.getElementById('loading').innerHTML = '<div class="error">No data found</div>';
                return;
            }
            
            document.getElementById('loading').style.display = 'none';
            document.getElementById('content').style.display = 'block';
            
            const stats = calculateStats(data);
            displayStats(stats);
            
            createLineChart(data);
            
            document.getElementById('last-update').textContent = 'Last Updated: ' + new Date().toLocaleString();
        }
        
        // Start when page loads
        window.addEventListener('load', init);
    </script>
</body>
</html>
