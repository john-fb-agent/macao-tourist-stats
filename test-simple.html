<!DOCTYPE html>
<html lang="zh-MO">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🇲🇴 Macau Tourist Statistics - TEST</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background: #f5f5f5; }
        .debug { background: #1a1a2e; color: #0f0; padding: 15px; margin: 20px 0; border-radius: 8px; font-family: monospace; white-space: pre-wrap; }
        .chart-container { background: white; padding: 20px; margin: 20px 0; border-radius: 8px; height: 400px; }
        .error { background: #ff4444; color: white; padding: 15px; margin: 20px 0; border-radius: 8px; }
    </style>
</head>
<body>
    <h1>🇲🇴 Macau Tourist Statistics - TEST</h1>
    
    <div id="debug" class="debug">Starting...</div>
    
    <div id="error" class="error" style="display:none;"></div>
    
    <div class="chart-container">
        <canvas id="testChart"></canvas>
    </div>
    
    <div id="data-output" style="background:white; padding:20px; margin:20px 0; border-radius:8px;">
        <h2>Data Preview</h2>
        <pre id="data-preview">Loading...</pre>
    </div>

    <script>
        const debug = document.getElementById('debug');
        const errorDiv = document.getElementById('error');
        
        function log(msg) {
            debug.textContent += '\n' + msg;
            console.log(msg);
        }
        
        function showError(msg) {
            errorDiv.style.display = 'block';
            errorDiv.textContent = 'ERROR: ' + msg;
            log('❌ ' + msg);
        }
        
        async function test() {
            try {
                log('1️⃣ Starting test...');
                
                log('2️⃣ Fetching data.json...');
                const response = await fetch('data/data.json');
                log('   Status: ' + response.status);
                
                if (!response.ok) {
                    throw new Error('HTTP ' + response.status);
                }
                
                log('3️⃣ Parsing JSON...');
                const data = await response.json();
                log('   Success: ' + data.success);
                log('   Records: ' + (data.value?.values?.length || 0));
                
                // Show data preview
                document.getElementById('data-preview').textContent = JSON.stringify({
                    success: data.success,
                    records: data.value?.values?.length,
                    first: data.value?.values?.[0],
                    last: data.value?.values?.[data.value?.values?.length - 1]
                }, null, 2);
                
                log('4️⃣ Creating chart...');
                const ctx = document.getElementById('testChart').getContext('2d');
                
                const values = data.value?.values || [];
                const labels = values.slice(0, 50).map(v => v.periodString);
                const totals = values.slice(0, 50).map(v => parseInt(v.value));
                
                log('   Labels: ' + labels.length);
                log('   First label: ' + labels[0]);
                
                new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: labels,
                        datasets: [{
                            label: 'Visitors',
                            data: totals,
                            borderColor: '#667eea',
                            backgroundColor: '#667eea20',
                            borderWidth: 2,
                            fill: true,
                            tension: 0.4
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false
                    }
                });
                
                log('5️⃣ ✅ SUCCESS! Chart created!');
                log('');
                log('If you see this message and a chart above, everything works!');
                log('The main index.html has an issue we need to find.');
                
            } catch (err) {
                showError(err.message);
                log('❌ Test failed: ' + err.message);
            }
        }
        
        // Run test when page loads
        window.addEventListener('load', test);
    </script>
</body>
</html>
