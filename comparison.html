<!DOCTYPE html>
<html lang="zh-MO">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>旅客與酒店對比 | Visitor & Hotel Comparison</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .header { text-align: center; color: white; margin-bottom: 30px; }
        .header h1 { font-size: 2.5em; margin-bottom: 10px; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
        .nav-links { text-align: center; margin-bottom: 30px; }
        .nav-links a {
            display: inline-block; background: rgba(255,255,255,0.2); color: white;
            padding: 12px 24px; margin: 5px; border-radius: 8px; text-decoration: none;
        }
        .nav-links a:hover { background: rgba(255,255,255,0.3); }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; border-radius: 15px; padding: 25px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .stat-card h3 { color: #667eea; font-size: 0.9em; margin-bottom: 10px; }
        .stat-card .value { font-size: 2.2em; font-weight: bold; color: #333; }
        .stat-card .sub { color: #666; font-size: 0.9em; margin-top: 5px; }
        .chart-card { background: white; border-radius: 15px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); margin-bottom: 30px; }
        .chart-card h2 { color: #333; margin-bottom: 10px; font-size: 1.5em; }
        .chart-container { position: relative; height: 450px; }
        .footer { text-align: center; color: white; margin-top: 30px; opacity: 0.8; }
        .loading { text-align: center; color: white; font-size: 1.5em; padding: 50px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>旅客與酒店對比</h1>
            <p>Visitor Arrivals & Hotel Occupancy Rate Comparison</p>
        </div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="monthly-trend.html">Monthly</a>
            <a href="yearly-trend.html">Yearly</a>
            <a href="comparison.html">Comparison</a>
        </div>
        <div id="loading" class="loading">Loading data...</div>
        <div id="content" style="display: none;">
            <div class="stats-grid" id="stats-grid"></div>
            <div class="chart-card">
                <h2>雙軸趨勢圖 (2008-2025)</h2>
                <div class="chart-container"><canvas id="dualAxisChart"></canvas></div>
            </div>
            <div class="chart-card">
                <h2>年度對比</h2>
                <div class="chart-container"><canvas id="yearlyChart"></canvas></div>
            </div>
        </div>
        <div class="footer">
            <p>Data from data.gov.mo</p>
        </div>
    </div>
    <script>
        async function loadData(indicator) {
            const response = await fetch(`data/${indicator}_data.json`);
            const data = await response.json();
            return data.value || data;
        }
        
        function parsePeriod(str) {
            const match = str.match(/(\d{4})年(\d{1,2})月/);
            return match ? { year: parseInt(match[1]), month: parseInt(match[2]) } : null;
        }
        
        async function init() {
            const visitorData = await loadData('visitor');
            const hotelData = await loadData('hotel');
            
            const visitorValues = visitorData.values.map(v => ({
                ...parsePeriod(v.periodString),
                value: parseInt(v.value)
            }));
            
            const hotelValues = hotelData.values.map(v => ({
                ...parsePeriod(v.periodString),
                value: parseFloat(v.value)
            }));
            
            const visitorFrom2008 = visitorValues.filter(v => v.year >= 2008);
            const hotelFrom2008 = hotelValues.filter(v => v.year >= 2008);
            
            const yearlyStats = {};
            visitorFrom2008.forEach(v => {
                if (!yearlyStats[v.year]) yearlyStats[v.year] = { visitorSum: 0, visitorCount: 0, hotelSum: 0, hotelCount: 0 };
                yearlyStats[v.year].visitorSum += v.value;
                yearlyStats[v.year].visitorCount++;
            });
            hotelFrom2008.forEach(v => {
                if (!yearlyStats[v.year]) yearlyStats[v.year] = { visitorSum: 0, visitorCount: 0, hotelSum: 0, hotelCount: 0 };
                yearlyStats[v.year].hotelSum += v.value;
                yearlyStats[v.year].hotelCount++;
            });
            
            const years = Object.keys(yearlyStats).sort().map(y => parseInt(y));
            const visitorYearly = years.map(y => Math.round(yearlyStats[y].visitorSum / yearlyStats[y].visitorCount));
            const hotelYearly = years.map(y => yearlyStats[y].hotelSum / yearlyStats[y].hotelCount);
            
            document.getElementById('stats-grid').innerHTML = `
                <div class="stat-card"><h3>入境旅客 (月均)</h3><div class="value">${(visitorFrom2008.reduce((a,b)=>a+b.value,0)/visitorFrom2008.length/1000000).toFixed(2)}M</div></div>
                <div class="stat-card"><h3>酒店入住率 (平均)</h3><div class="value">${(hotelFrom2008.reduce((a,b)=>a+b.value,0)/hotelFrom2008.length).toFixed(1)}%</div></div>
                <div class="stat-card"><h3>數據月份</h3><div class="value">${visitorFrom2008.length}</div></div>
                <div class="stat-card"><h3>年份範圍</h3><div class="value">2008-${Math.max(...years)}</div></div>
            `;
            
            new Chart(document.getElementById('dualAxisChart'), {
                type: 'line',
                data: {
                    labels: years,
                    datasets: [
                        { label: '入境旅客 (百萬人次)', data: visitorYearly.map(v => v/1000000), borderColor: '#667eea', backgroundColor: 'rgba(102,126,234,0.1)', yAxisID: 'y', tension: 0.3 },
                        { label: '酒店入住率 (%)', data: hotelYearly, borderColor: '#ff6b6b', backgroundColor: 'rgba(255,107,107,0.1)', yAxisID: 'y1', tension: 0.3 }
                    ]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    interaction: { mode: 'index', intersect: false },
                    scales: {
                        y: { type: 'linear', display: true, position: 'left', title: { display: true, text: '入境旅客 (百萬)' } },
                        y1: { type: 'linear', display: true, position: 'right', title: { display: true, text: '入住率 (%)' }, grid: { drawOnChartArea: false } }
                    }
                }
            });
            
            new Chart(document.getElementById('yearlyChart'), {
                type: 'bar',
                data: {
                    labels: years,
                    datasets: [
                        { label: '入境旅客 (百萬)', data: visitorYearly.map(v => v/1000000), backgroundColor: '#667eea' },
                        { label: '入住率 (%)', data: hotelYearly, backgroundColor: '#ff6b6b', yAxisID: 'y1' }
                    ]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    scales: {
                        y: { title: { display: true, text: '入境旅客 (百萬)' } },
                        y1: { position: 'right', title: { display: true, text: '入住率 (%)' }, grid: { drawOnChartArea: false } }
                    }
                }
            });
            
            document.getElementById('loading').style.display = 'none';
            document.getElementById('content').style.display = 'block';
        }
        
        window.addEventListener('load', init);
    </script>
</body>
</html>
